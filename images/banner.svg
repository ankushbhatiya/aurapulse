<svg width="1200" height="400" viewBox="0 0 1200 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#09090b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#18181b;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <rect width="1200" height="400" fill="url(#bg-grad)"/>
  
  <!-- Abstract Pulse Lines -->
  <path d="M 0 200 Q 150 150 300 200 T 600 200 T 900 200 T 1200 200" stroke="#00f6ff" stroke-width="2" fill="transparent" opacity="0.2"/>
  <path d="M 0 220 Q 150 170 300 220 T 600 220 T 900 220 T 1200 220" stroke="#64ffda" stroke-width="1" fill="transparent" opacity="0.1"/>
  
  <!-- Text -->
  <text x="50%" y="45%" dominant-baseline="middle" text-anchor="middle" font-family="Arial, sans-serif" font-weight="900" font-size="80" fill="#ffffff" filter="url(#glow)" style="letter-spacing: 15px;">
    AURAPULSE
  </text>
  <text x="50%" y="60%" dominant-baseline="middle" text-anchor="middle" font-family="monospace" font-weight="bold" font-size="20" fill="#00f6ff" style="letter-spacing: 5px; opacity: 0.8;">
    PREDICTIVE SOCIAL SIMULATION ENGINE
  </text>
  
  <!-- Accent Dots -->
  <circle cx="50%" cy="75%" r="4" fill="#64ffda" opacity="0.6">
    <animate attributeName="opacity" values="0.2;1;0.2" dur="3s" repeatCount="indefinite" />
  </circle>
</svg>
